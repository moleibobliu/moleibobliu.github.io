locale: "en-US"
site_theme: "default"
title: "Molei Liu"
title_separator: "-"
name: &name "Molei Liu"
description: &description "Molei Liu's academic website: biostatistics, statistical machine learning, and biomedical data science."
url: "https://moleibobliu.github.io"
baseurl: ""
repository: "moleibobliu/moleibobliu.github.io"
remote_theme: "academicpages/academicpages.github.io@v0.8.4"

# Sidebar profile
author:
  avatar: "https://avatars.githubusercontent.com/u/28192929?v=4"
  name: "Molei Liu"
  bio: "Biostatistics, statistical machine learning, and biomedical data science"
  location: "Beijing, China"
  employer: "Peking University"
  uri: "https://moleibobliu.github.io"
  email: "moleiliu95@gmail.com"
  github: "moleibobliu"

# Site behavior
breadcrumbs: false
words_per_minute: 160
future: true
read_more: "disabled"
talkmap_link: false
comments:
  provider: false
atom_feed:
  hide: true
analytics:
  provider: false

include:
  - _pages
  - files
exclude:
  - README.md
  - LICENSE
  - scripts
  - vendor
  - Gemfile
  - Gemfile.lock
  - node_modules
  - .github

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"
markdown: kramdown
highlighter: rouge
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo

collections:
  publications:
    output: true
    permalink: /publication/:path/
  talks:
    output: true
    permalink: /talk/:path/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: false
      comments: false
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: false

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: Asia/Shanghai

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development
